openapi: 3.1.0
info:
  title: GitHub Actions API
  description: REST API for managing GitHub Actions workflows, runs, artifacts, secrets, runners, caches, variables, permissions, and OIDC.
  version: 1.0.0
  contact:
    name: GitHub Support
    url: https://support.github.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://api.github.com
    description: GitHub REST API
security:
  - bearerAuth: []
  - personalAccessToken: []
tags:
  - name: Workflows
    description: Manage workflow files and workflow runs
  - name: Workflow Runs
    description: Manage and monitor workflow run executions
  - name: Jobs
    description: Access information about workflow jobs
  - name: Artifacts
    description: Download and manage workflow run artifacts
  - name: Secrets
    description: Manage encrypted secrets for Actions
  - name: Variables
    description: Create and manage workflow variables
  - name: Self-hosted Runners
    description: Manage self-hosted runners for workflows
  - name: Self-hosted Runner Groups
    description: Manage runner groups for organizations
  - name: GitHub-hosted Runners
    description: Provision and manage GitHub-hosted runners
  - name: Cache
    description: Manage workflow dependency caches
  - name: Permissions
    description: Control Actions enablement and permissions
  - name: OIDC
    description: Manage OIDC subject claim customization
paths:
  /repos/{owner}/{repo}/actions/workflows:
    get:
      operationId: listRepoWorkflows
      summary: List repository workflows
      description: Lists the workflows in a repository. Anyone with read access to the repository can use this endpoint.
      tags:
        - Workflows
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/perPage'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Successfully retrieved workflows
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  workflows:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workflow'
  /repos/{owner}/{repo}/actions/workflows/{workflow_id}:
    get:
      operationId: getWorkflow
      summary: Get a workflow
      description: Gets a specific workflow. You can replace workflow_id with the workflow file name.
      tags:
        - Workflows
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/workflowId'
      responses:
        '200':
          description: Successfully retrieved workflow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
  /repos/{owner}/{repo}/actions/workflows/{workflow_id}/disable:
    put:
      operationId: disableWorkflow
      summary: Disable a workflow
      description: Disables a workflow and sets the state of the workflow to disabled_manually.
      tags:
        - Workflows
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/workflowId'
      responses:
        '204':
          description: Successfully disabled workflow
  /repos/{owner}/{repo}/actions/workflows/{workflow_id}/enable:
    put:
      operationId: enableWorkflow
      summary: Enable a workflow
      description: Enables a workflow and sets the state of the workflow to active.
      tags:
        - Workflows
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/workflowId'
      responses:
        '204':
          description: Successfully enabled workflow
  /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches:
    post:
      operationId: createWorkflowDispatch
      summary: Create a workflow dispatch event
      description: Manually triggers a GitHub Actions workflow run. The workflow must be configured to support the workflow_dispatch event.
      tags:
        - Workflows
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/workflowId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ref
              properties:
                ref:
                  type: string
                  description: The git reference for the workflow. The reference can be a branch or tag name.
                inputs:
                  type: object
                  description: Input keys and values configured in the workflow file. The maximum number of properties is 10.
                  additionalProperties:
                    type: string
      responses:
        '204':
          description: Successfully dispatched workflow
  /repos/{owner}/{repo}/actions/workflows/{workflow_id}/runs:
    get:
      operationId: listWorkflowRuns
      summary: List workflow runs for a workflow
      description: List all workflow runs for a workflow. You can replace workflow_id with the workflow file name.
      tags:
        - Workflows
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/workflowId'
        - name: actor
          in: query
          schema:
            type: string
        - name: branch
          in: query
          schema:
            type: string
        - name: event
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [completed, action_required, cancelled, failure, neutral, skipped, stale, success, timed_out, in_progress, queued, requested, waiting, pending]
        - $ref: '#/components/parameters/perPage'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Successfully retrieved workflow runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  workflow_runs:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkflowRun'
  /repos/{owner}/{repo}/actions/workflows/{workflow_id}/timing:
    get:
      operationId: getWorkflowUsage
      summary: Get workflow usage
      description: Gets the number of billable minutes used by a specific workflow during the current billing cycle.
      tags:
        - Workflows
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/workflowId'
      responses:
        '200':
          description: Successfully retrieved workflow usage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowUsage'
  /repos/{owner}/{repo}/actions/runs:
    get:
      operationId: listWorkflowRunsForRepo
      summary: List workflow runs for a repository
      description: Lists all workflow runs for a repository. Anyone with read access to the repository can use this endpoint.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - name: actor
          in: query
          schema:
            type: string
        - name: branch
          in: query
          schema:
            type: string
        - name: event
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [completed, action_required, cancelled, failure, neutral, skipped, stale, success, timed_out, in_progress, queued, requested, waiting, pending]
        - $ref: '#/components/parameters/perPage'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Successfully retrieved workflow runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  workflow_runs:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkflowRun'
  /repos/{owner}/{repo}/actions/runs/{run_id}:
    get:
      operationId: getWorkflowRun
      summary: Get a workflow run
      description: Gets a specific workflow run.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      responses:
        '200':
          description: Successfully retrieved workflow run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRun'
    delete:
      operationId: deleteWorkflowRun
      summary: Delete a workflow run
      description: Deletes a specific workflow run. Anyone with write access to the repository can use this endpoint.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      responses:
        '204':
          description: Successfully deleted workflow run
  /repos/{owner}/{repo}/actions/runs/{run_id}/approve:
    post:
      operationId: approveWorkflowRun
      summary: Approve a workflow run for a fork pull request
      description: Approves a workflow run for a pull request from a public fork of a first time contributor.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      responses:
        '201':
          description: Successfully approved workflow run
  /repos/{owner}/{repo}/actions/runs/{run_id}/approvals:
    get:
      operationId: getWorkflowRunApprovals
      summary: Get the review history for a workflow run
      description: Anyone with read access to the repository can use this endpoint.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      responses:
        '200':
          description: Successfully retrieved approvals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnvironmentApproval'
  /repos/{owner}/{repo}/actions/runs/{run_id}/attempts/{attempt_number}:
    get:
      operationId: getWorkflowRunAttempt
      summary: Get a workflow run attempt
      description: Gets a specific workflow run attempt.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
        - $ref: '#/components/parameters/attemptNumber'
      responses:
        '200':
          description: Successfully retrieved workflow run attempt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRun'
  /repos/{owner}/{repo}/actions/runs/{run_id}/attempts/{attempt_number}/logs:
    get:
      operationId: downloadWorkflowRunAttemptLogs
      summary: Download workflow run attempt logs
      description: Gets a redirect URL to download an archive of log files for a specific workflow run attempt.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
        - $ref: '#/components/parameters/attemptNumber'
      responses:
        '302':
          description: Redirect to log download URL
  /repos/{owner}/{repo}/actions/runs/{run_id}/cancel:
    post:
      operationId: cancelWorkflowRun
      summary: Cancel a workflow run
      description: Cancels a workflow run using its id.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      responses:
        '202':
          description: Successfully requested cancellation
  /repos/{owner}/{repo}/actions/runs/{run_id}/deployment_protection_rule:
    post:
      operationId: reviewCustomGatesForRun
      summary: Review custom deployment protection rules for a workflow run
      description: Approve or reject custom deployment protection rules for a workflow run.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - environment_name
                - state
              properties:
                environment_name:
                  type: string
                state:
                  type: string
                  enum: [approved, rejected]
                comment:
                  type: string
      responses:
        '204':
          description: Successfully reviewed deployment protection rule
  /repos/{owner}/{repo}/actions/runs/{run_id}/force-cancel:
    post:
      operationId: forceCancelWorkflowRun
      summary: Force cancel a workflow run
      description: Force cancels a workflow run. Use this endpoint to force cancel a workflow run that is not responding to a normal cancel request.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      responses:
        '202':
          description: Successfully requested force cancellation
  /repos/{owner}/{repo}/actions/runs/{run_id}/logs:
    get:
      operationId: downloadWorkflowRunLogs
      summary: Download workflow run logs
      description: Gets a redirect URL to download an archive of log files for a workflow run. This link expires after 1 minute.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      responses:
        '302':
          description: Redirect to log download URL
    delete:
      operationId: deleteWorkflowRunLogs
      summary: Delete workflow run logs
      description: Deletes all logs for a workflow run.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      responses:
        '204':
          description: Successfully deleted workflow run logs
  /repos/{owner}/{repo}/actions/runs/{run_id}/pending_deployments:
    get:
      operationId: getPendingDeployments
      summary: Get pending deployments for a workflow run
      description: Get all deployment environments for a workflow run that are waiting for protection rules to pass.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      responses:
        '200':
          description: Successfully retrieved pending deployments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PendingDeployment'
    post:
      operationId: reviewPendingDeployments
      summary: Review pending deployments for a workflow run
      description: Approve or reject pending deployments that are waiting on approval by a required reviewer.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - environment_ids
                - state
                - comment
              properties:
                environment_ids:
                  type: array
                  items:
                    type: integer
                state:
                  type: string
                  enum: [approved, rejected]
                comment:
                  type: string
      responses:
        '200':
          description: Successfully reviewed pending deployments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Deployment'
  /repos/{owner}/{repo}/actions/runs/{run_id}/rerun:
    post:
      operationId: rerunWorkflowRun
      summary: Re-run a workflow
      description: Re-runs your workflow run using its id.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enable_debug_logging:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Successfully re-ran workflow
  /repos/{owner}/{repo}/actions/runs/{run_id}/rerun-failed-jobs:
    post:
      operationId: rerunFailedJobs
      summary: Re-run failed jobs from a workflow run
      description: Re-run all of the failed jobs and their dependent jobs in a workflow run using the id of the workflow run.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enable_debug_logging:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Successfully re-ran failed jobs
  /repos/{owner}/{repo}/actions/runs/{run_id}/timing:
    get:
      operationId: getWorkflowRunUsage
      summary: Get workflow run usage
      description: Gets the number of billable minutes and total run time for a specific workflow run.
      tags:
        - Workflow Runs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
      responses:
        '200':
          description: Successfully retrieved workflow run usage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunUsage'
  /repos/{owner}/{repo}/actions/runs/{run_id}/jobs:
    get:
      operationId: listJobsForWorkflowRun
      summary: List jobs for a workflow run
      description: Lists jobs for a workflow run. Anyone with read access to the repository can use this endpoint.
      tags:
        - Jobs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
        - name: filter
          in: query
          schema:
            type: string
            enum: [latest, all]
            default: latest
        - $ref: '#/components/parameters/perPage'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Successfully retrieved jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
  /repos/{owner}/{repo}/actions/runs/{run_id}/attempts/{attempt_number}/jobs:
    get:
      operationId: listJobsForWorkflowRunAttempt
      summary: List jobs for a workflow run attempt
      description: Lists jobs for a specific workflow run attempt.
      tags:
        - Jobs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
        - $ref: '#/components/parameters/attemptNumber'
        - $ref: '#/components/parameters/perPage'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Successfully retrieved jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
  /repos/{owner}/{repo}/actions/jobs/{job_id}:
    get:
      operationId: getJobForWorkflowRun
      summary: Get a job for a workflow run
      description: Gets a specific job in a workflow run.
      tags:
        - Jobs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - name: job_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Successfully retrieved job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
  /repos/{owner}/{repo}/actions/jobs/{job_id}/logs:
    get:
      operationId: downloadJobLogsForWorkflowRun
      summary: Download job logs for a workflow run
      description: Gets a redirect URL to download a plain text file of logs for a workflow job. This link expires after 1 minute.
      tags:
        - Jobs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - name: job_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '302':
          description: Redirect to log download URL
  /repos/{owner}/{repo}/actions/jobs/{job_id}/rerun:
    post:
      operationId: rerunJobForWorkflowRun
      summary: Re-run a job from a workflow run
      description: Re-run a job and its dependent jobs in a workflow run.
      tags:
        - Jobs
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - name: job_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enable_debug_logging:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Successfully re-ran job
  /repos/{owner}/{repo}/actions/artifacts:
    get:
      operationId: listArtifactsForRepo
      summary: List artifacts for a repository
      description: Lists all artifacts for a repository.
      tags:
        - Artifacts
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - name: name
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/perPage'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Successfully retrieved artifacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  artifacts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Artifact'
  /repos/{owner}/{repo}/actions/artifacts/{artifact_id}:
    get:
      operationId: getArtifact
      summary: Get an artifact
      description: Gets a specific artifact for a workflow run.
      tags:
        - Artifacts
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/artifactId'
      responses:
        '200':
          description: Successfully retrieved artifact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
    delete:
      operationId: deleteArtifact
      summary: Delete an artifact
      description: Deletes an artifact for a workflow run.
      tags:
        - Artifacts
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/artifactId'
      responses:
        '204':
          description: Successfully deleted artifact
  /repos/{owner}/{repo}/actions/artifacts/{artifact_id}/{archive_format}:
    get:
      operationId: downloadArtifact
      summary: Download an artifact
      description: Gets a redirect URL to download an archive for a repository. The archive_format must be zip.
      tags:
        - Artifacts
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/artifactId'
        - name: archive_format
          in: path
          required: true
          schema:
            type: string
            enum: [zip]
      responses:
        '302':
          description: Redirect to artifact download URL
  /repos/{owner}/{repo}/actions/runs/{run_id}/artifacts:
    get:
      operationId: listWorkflowRunArtifacts
      summary: List workflow run artifacts
      description: Lists artifacts for a workflow run.
      tags:
        - Artifacts
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/runId'
        - name: name
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/perPage'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Successfully retrieved artifacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  artifacts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Artifact'
  /repos/{owner}/{repo}/actions/caches:
    get:
      operationId: listActionsCaches
      summary: List GitHub Actions caches for a repository
      description: Lists the GitHub Actions caches for a repository.
      tags:
        - Cache
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - name: ref
          in: query
          schema:
            type: string
        - name: key
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [created_at, last_accessed_at, size_in_bytes]
            default: last_accessed_at
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - $ref: '#/components/parameters/perPage'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Successfully retrieved caches
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  actions_caches:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActionsCacheEntry'
    delete:
      operationId: deleteActionsCacheByKey
      summary: Delete GitHub Actions caches for a repository (by key)
      description: Deletes one or more GitHub Actions caches for a repository, using a complete cache key.
      tags:
        - Cache
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - name: key
          in: query
          required: true
          schema:
            type: string
