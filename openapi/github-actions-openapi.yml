        url:
          type: string
          format: uri
        html_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        run_started_at:
          type: string
          format: date-time
        jobs_url:
          type: string
          format: uri
        logs_url:
          type: string
          format: uri
        artifacts_url:
          type: string
          format: uri
        cancel_url:
          type: string
          format: uri
        rerun_url:
