          example: Example Title
        size_in_bytes:
          type: integer
          description: The size in bytes of the artifact.
          example: 10
        url:
          type: string
          format: uri
          example: https://www.example.com
        archive_download_url:
          type: string
          format: uri
          example: https://www.example.com
        expired:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
        expires_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
