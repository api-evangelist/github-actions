components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: GitHub personal access token or OAuth token
    personalAccessToken:
      type: http
      scheme: bearer
      description: Fine-grained personal access token with Actions permissions
  parameters:
    owner:
      name: owner
      in: path
      required: true
      schema:
        type: string
      description: The account owner of the repository.
    repo:
      name: repo
      in: path
      required: true
      schema:
        type: string
      description: The name of the repository without the .git extension.
    org:
      name: org
      in: path
      required: true
      schema:
        type: string
      description: The organization name.
    workflowId:
      name: workflow_id
      in: path
      required: true
      schema:
        oneOf:
        - type: integer
        - type: string
      description: The ID of the workflow or the workflow file name.
    runId:
      name: run_id
      in: path
      required: true
      schema:
        type: integer
      description: The unique identifier of the workflow run.
    artifactId:
      name: artifact_id
      in: path
      required: true
      schema:
        type: integer
      description: The unique identifier of the artifact.
    runnerId:
      name: runner_id
      in: path
      required: true
      schema:
        type: integer
      description: Unique identifier of the self-hosted runner.
    runnerGroupId:
      name: runner_group_id
      in: path
      required: true
      schema:
        type: integer
      description: Unique identifier of the self-hosted runner group.
    secretName:
      name: secret_name
      in: path
      required: true
      schema:
        type: string
      description: The name of the secret.
    variableName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: The name of the variable.
    attemptNumber:
      name: attempt_number
      in: path
      required: true
      schema:
        type: integer
      description: The attempt number of the workflow run.
    perPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 30
        maximum: 100
      description: The number of results per page (max 100).
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
      description: The page number of the results to fetch.
  schemas:
    Workflow:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the workflow.
          example: abc123
        node_id:
          type: string
          example: '500123'
        name:
          type: string
          description: The name of the workflow.
          example: Example Title
        path:
          type: string
          description: The path of the workflow file relative to the root of the repository.
          example: example_value
        state:
          type: string
          enum: [active, deleted, disabled_fork, disabled_inactivity, disabled_manually, unknown]
          example: active
        created_at:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        url:
          type: string
          format: uri
          example: https://www.example.com
        html_url:
          type: string
          format: uri
          example: https://www.example.com
        badge_url:
          type: string
          format: uri
          example: https://www.example.com
    WorkflowRun:
      type: object
      properties:
        id:
          type: integer
          description: The ID of the workflow run.
          example: abc123
        name:
          type: string
          description: The name of the workflow run.
          example: Example Title
        node_id:
          type: string
          example: '500123'
        head_branch:
          type: string
          example: example_value
        head_sha:
          type: string
          description: The SHA of the head commit that points to the version of the workflow being run.
          example: example_value
        path:
          type: string
          example: example_value
        display_title:
          type: string
          description: The title of the workflow run displayed in the UI.
          example: example_value
        run_number:
          type: integer
          description: The auto incrementing run number for the workflow run.
          example: 10
        run_attempt:
          type: integer
          description: Attempt number of the run, 1 for first attempt and higher if the workflow was re-run.
          example: 10
        event:
          type: string
          description: The event that triggered the workflow run.
          example: example_value
        status:
          type: string
          enum: [queued, in_progress, completed, waiting, requested, pending]
          example: queued
        conclusion:
          type: string
          nullable: true
          enum: [success, failure, neutral, cancelled, skipped, timed_out, action_required, stale, null]
          example: success
        workflow_id:
          type: integer
          example: '500123'
        url:
          type: string
          format: uri
          example: https://www.example.com
        html_url:
          type: string
          format: uri
          example: https://www.example.com
        created_at:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        run_started_at:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        jobs_url:
          type: string
          format: uri
          example: https://www.example.com
        logs_url:
          type: string
          format: uri
          example: https://www.example.com
        artifacts_url:
          type: string
          format: uri
          example: https://www.example.com
        cancel_url:
          type: string
          format: uri
          example: https://www.example.com
        rerun_url:
          type: string
          format: uri
          example: https://www.example.com
        workflow_url:
          type: string
          format: uri
          example: https://www.example.com
        actor:
          $ref: '#/components/schemas/SimpleUser'
        triggering_actor:
          $ref: '#/components/schemas/SimpleUser'
        repository:
          $ref: '#/components/schemas/MinimalRepository'
        head_repository:
          $ref: '#/components/schemas/MinimalRepository'
        head_commit:
          $ref: '#/components/schemas/SimpleCommit'
    Job:
      type: object
      properties:
        id:
          type: integer
          description: The id of the job.
          example: abc123
        run_id:
          type: integer
          description: The id of the associated workflow run.
          example: '500123'
        run_url:
          type: string
          format: uri
          example: https://www.example.com
        run_attempt:
          type: integer
          example: 10
        node_id:
          type: string
          example: '500123'
        head_sha:
          type: string
          example: example_value
        url:
          type: string
          format: uri
          example: https://www.example.com
        html_url:
          type: string
          format: uri
          nullable: true
          example: https://www.example.com
        status:
          type: string
          enum: [queued, in_progress, completed, waiting, requested, pending]
          example: queued
        conclusion:
          type: string
          nullable: true
          enum: [success, failure, neutral, cancelled, skipped, timed_out, action_required, null]
          example: success
        created_at:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        started_at:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        completed_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
        name:
          type: string
          description: The name of the job.
          example: Example Title
        steps:
          type: array
          items:
            $ref: '#/components/schemas/JobStep'
          example: []
        labels:
          type: array
          items:
            type: string
          example: []
        runner_id:
          type: integer
          nullable: true
          example: '500123'
        runner_name:
          type: string
          nullable: true
          example: example_value
        runner_group_id:
          type: integer
          nullable: true
          example: '500123'
        runner_group_name:
          type: string
          nullable: true
          example: example_value
        workflow_name:
          type: string
          nullable: true
          example: example_value
    JobStep:
      type: object
      properties:
        name:
          type: string
          example: Example Title
        status:
          type: string
          enum: [queued, in_progress, completed]
          example: queued
        conclusion:
          type: string
          nullable: true
          enum: [failure, skipped, success, cancelled, null]
          example: failure
        number:
          type: integer
          example: 10
        started_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
        completed_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
    Artifact:
      type: object
      properties:
        id:
          type: integer
          example: abc123
